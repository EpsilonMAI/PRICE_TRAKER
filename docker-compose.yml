services:
  db:
    image: postgres:16-alpine
    container_name: price_tracker_db
    environment:
      POSTGRES_DB: ${DB_NAME:-price_tracker}
      POSTGRES_USER: ${DB_USER:-price_tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-price_tracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: price_tracker_backend
    entrypoint: ["sh", "/app/docker/entrypoint.sh"]
    # Chrome в Docker требует расширенный /dev/shm и отключённый seccomp
    shm_size: '2gb'
    security_opt:
      - seccomp:unconfined
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/tracker-ui
      dockerfile: Dockerfile
    container_name: price_tracker_frontend
    env_file:
      - .env.docker
    volumes:
      - ./frontend/tracker-ui:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
