<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - PriceTracker</title>
    <script>
        if (localStorage.getItem('access_token')) {
            window.location.replace('/index.html');
        }
    </script>
</head>
<body class="bg-gray-50 font-sans antialiased">

    <nav class="bg-white border-b border-gray-200 px-4 py-2.5">
        <div class="flex flex-wrap justify-between items-center mx-auto max-w-screen-xl">
            <a href="/index.html" class="self-center text-xl font-semibold whitespace-nowrap">PriceTracker</a>
            <div class="flex items-center space-x-4">
                <a href="/login.html" class="text-gray-700 hover:text-blue-700">Войти</a>
            </div>
        </div>
    </nav>

    <main class="p-8 max-w-md mx-auto" x-data="registerApp()" x-init="init()">
        
        <h1 class="text-3xl font-bold mb-8 text-gray-900 text-center">Регистрация</h1>

        <!-- Ошибка -->
        <div x-show="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <p x-text="error"></p>
        </div>

        <!-- Успех -->
        <div x-show="success" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
            <p>Регистрация успешна! Перенаправление...</p>
        </div>

        <form @submit.prevent="register" class="bg-white shadow-md rounded-lg p-8">
            <div class="mb-4">
                <label for="username" class="block text-gray-700 text-sm font-bold mb-2">
                    Имя пользователя
                </label>
                <input 
                    type="text" 
                    id="username" 
                    x-model="formData.username"
                    required
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Введите имя пользователя"
                >
            </div>

            <div class="mb-4">
                <label for="email" class="block text-gray-700 text-sm font-bold mb-2">
                    Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    x-model="formData.email"
                    required
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="your@email.com"
                >
            </div>

            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">
                    Пароль
                </label>
                <input 
                    type="password" 
                    id="password" 
                    x-model="formData.password"
                    required
                    minlength="8"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Минимум 8 символов"
                >
            </div>

            <button 
                type="submit"
                :disabled="loading"
                class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline disabled:opacity-50"
            >
                <span x-show="!loading">Зарегистрироваться</span>
                <span x-show="loading">Регистрация...</span>
            </button>

            <p class="text-center text-gray-600 text-sm mt-4">
                Уже есть аккаунт? 
                <a href="/login.html" class="text-blue-700 hover:text-blue-800 font-medium">Войти</a>
            </p>
        </form>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
